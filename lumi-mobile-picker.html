<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMI Mobile - Category Picker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
            line-height: 1.5;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #ff9900;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid;
        }

        .section-header.custody { border-color: #ff6b9d; }
        .section-header.calendar { border-color: #00ccff; }
        .section-header.todo { border-color: #ff9900; }
        .section-header.lumi { border-color: #cc99ff; }

        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .section-header.custody h2 { color: #ff6b9d; }
        .section-header.calendar h2 { color: #00ccff; }
        .section-header.todo h2 { color: #ff9900; }
        .section-header.lumi h2 { color: #cc99ff; }

        .count {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            background: #1c1c1e;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .option:hover {
            background: #2c2c2e;
        }

        .option input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            accent-color: #ff9900;
            flex-shrink: 0;
        }

        .option-content {
            flex: 1;
        }

        .option-label {
            font-size: 16px;
            font-weight: 500;
            display: block;
        }

        .option-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        .summary {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1c1c1e;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-text {
            font-size: 15px;
        }

        .summary-count {
            color: #ff9900;
            font-weight: 600;
        }

        .submit-btn {
            padding: 12px 24px;
            background: #ff9900;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #ffaa22;
        }

        .spacer {
            height: 100px;
        }
    </style>
</head>
<body>

                        <span class="option-label">Frustration</span>
                        <span class="option-desc">Log irritation</span>
                    </div>
                </label>
                <label class="option">
                    <input type="checkbox" name="lumi" value="bookmark">
                    <div class="option-content">
                        <span class="option-label">Bookmark</span>
                        <span class="option-desc">Save for later</span>
                    </div>
                </label>
                <label class="option">
                    <input type="checkbox" name="lumi" value="reflection">
                    <div class="option-content">
                        <span class="option-label">Reflection</span>
                        <span class="option-desc">End of day thoughts</span>
                    </div>
                </label>
                <label class="option">
                    <input type="checkbox" name="lumi" value="random">
                    <div class="option-content">
                        <span class="option-label">Random</span>
                        <span class="option-desc">Miscellaneous capture</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="spacer"></div>
    </form>

    <div class="summary">
        <div class="summary-text">
            <span class="summary-count" id="totalCount">0</span> categories selected
        </div>
        <button type="button" class="submit-btn" onclick="showSelections()">Show Selections</button>
    </div>

    <script>
        const form = document.getElementById('categoryForm');

        function updateCounts() {
            const sections = ['custody', 'calendar', 'todo', 'lumi'];
            let total = 0;

            sections.forEach(section => {
                const count = form.querySelectorAll(`input[name="${section}"]:checked`).length;
                document.querySelector(`.${section}-count`).textContent = `${count} selected`;
                total += count;
            });

            document.getElementById('totalCount').textContent = total;
        }

        form.addEventListener('change', updateCounts);

        function showSelections() {
            const sections = ['custody', 'calendar', 'todo', 'lumi'];
            const selections = {};

            sections.forEach(section => {
                const checked = form.querySelectorAll(`input[name="${section}"]:checked`);
                selections[section] = Array.from(checked).map(cb => {
                    const label = cb.closest('.option').querySelector('.option-label').textContent;
                    return label;
                });
            });

            let message = 'Your selections:\n\n';
            sections.forEach(section => {
                if (selections[section].length > 0) {
                    message += `${section.toUpperCase()}:\n`;
                    selections[section].forEach(item => {
                        message += `  - ${item}\n`;
                    });
                    message += '\n';
                }
            });

            if (Object.values(selections).every(arr => arr.length === 0)) {
                message = 'No categories selected yet.';
            }

            alert(message);

            // Also log to console in a format easy to copy
            console.log('Selected categories:', JSON.stringify(selections, null, 2));
        }
    </script>
</body>
</html>
