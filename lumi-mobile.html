<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>LUMI</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/lumi-192.png">
    <style>
        :root {
            --lcars-orange: #ff9900;
            --lcars-cyan: #00ccff;
            --lcars-purple: #cc99ff;
            --lcars-pink: #ff6b9d;
            --lcars-green: #30d158;
            --lcars-red: #ff453a;
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --bg-elevated: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --text-tertiary: rgba(255,255,255,0.3);
            --separator: rgba(255,255,255,0.08);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .app { height: 100%; display: flex; flex-direction: column; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; padding-top: calc(12px + var(--safe-top));
            background: var(--bg-primary); border-bottom: 1px solid var(--separator);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lcars-green); }
        .header-title { font-size: 20px; font-weight: 600; }
        .reset-btn {
            background: var(--bg-tertiary); border: none; border-radius: 8px;
            padding: 8px 14px; font-family: inherit; font-size: 14px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer; display: none;
        }
        .reset-btn:active { background: var(--bg-elevated); }

        /* Main */
        .main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }

        /* Progress */
        .progress-bar {
            display: flex; gap: 6px; margin-bottom: 24px;
        }
        .progress-step {
            flex: 1; height: 4px; background: var(--bg-tertiary); border-radius: 2px;
            transition: background 0.3s;
        }
        .progress-step.active { background: var(--lcars-orange); }
        .progress-step.done { background: var(--lcars-green); }

        /* Step */
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .step-label {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .step-question {
            font-size: 28px; font-weight: 700; margin-bottom: 20px; line-height: 1.2;
        }

        /* Selection summary */
        .selection-summary {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
        }
        .selection-chip {
            background: var(--bg-tertiary); border-radius: 16px; padding: 6px 12px;
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
        }
        .selection-chip .chip-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        /* Options list */
        .options-list { display: flex; flex-direction: column; gap: 8px; }
        .option-btn {
            display: flex; align-items: center; gap: 14px;
            width: 100%; padding: 16px; background: var(--bg-secondary);
            border: 2px solid transparent; border-radius: 12px;
            text-align: left; font-family: inherit; cursor: pointer;
            transition: all 0.15s;
        }
        .option-btn:active { background: var(--bg-tertiary); transform: scale(0.98); }
        .option-btn.selected { border-color: var(--lcars-orange); background: var(--bg-tertiary); }
        .option-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .option-text { flex: 1; }
        .option-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
        .option-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
        .option-chevron { color: var(--text-tertiary); font-size: 20px; }

        /* Color variants */
        .option-btn.pink .option-icon { background: var(--lcars-pink); }
        .option-btn.cyan .option-icon { background: var(--lcars-cyan); }
        .option-btn.purple .option-icon { background: var(--lcars-purple); }
        .option-btn.orange .option-icon { background: var(--lcars-orange); }
        .option-btn.green .option-icon { background: var(--lcars-green); }
        .option-btn.red .option-icon { background: var(--lcars-red); }

        /* Subsection within options */
        .options-section-label {
            font-size: 12px; font-weight: 600; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 16px 0 8px; margin-top: 8px;
            border-top: 1px solid var(--separator);
        }
        .options-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

        /* Text input step */
        .text-input-area { margin-top: 16px; }
        .text-input {
            width: 100%; padding: 16px; background: var(--bg-secondary);
            border: 2px solid var(--bg-tertiary); border-radius: 12px;
            font-family: inherit; font-size: 17px; color: var(--text-primary);
            resize: none; min-height: 100px;
        }
        .text-input:focus { outline: none; border-color: var(--lcars-cyan); }
        .text-input::placeholder { color: var(--text-tertiary); }

        /* Final summary */
        .summary-card {
            background: var(--bg-secondary); border-radius: 16px; padding: 20px;
            margin-bottom: 20px;
        }
        .summary-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 12px 0; border-bottom: 1px solid var(--separator);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { font-size: 14px; color: var(--text-secondary); }
        .summary-value { font-size: 16px; font-weight: 500; text-align: right; max-width: 60%; }

        /* Action button */
        .action-btn {
            width: 100%; padding: 18px; background: var(--lcars-orange);
            border: none; border-radius: 14px; font-family: inherit;
            font-size: 18px; font-weight: 600; color: #000; cursor: pointer;
            margin-top: 20px;
        }
        .action-btn:active { opacity: 0.9; transform: scale(0.98); }
        .action-btn:disabled { background: var(--bg-tertiary); color: var(--text-tertiary); }

        /* Skip link */
        .skip-link {
            display: block; text-align: center; padding: 16px;
            color: var(--text-secondary); font-size: 15px; cursor: pointer;
        }
        .skip-link:active { color: var(--text-primary); }

        /* Toast */
        .toast {
            position: fixed; bottom: calc(50px + var(--safe-bottom)); left: 50%;
            transform: translateX(-50%) translateY(100px); display: flex; align-items: center; gap: 10px;
            padding: 14px 20px; background: var(--bg-elevated); border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1); z-index: 200;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { width: 22px; height: 22px; color: var(--lcars-green); }
        .toast-text { font-size: 15px; font-weight: 500; }

        .bottom-spacer { height: calc(20px + var(--safe-bottom)); }

        @media (min-width: 500px) {
            .main-scroll { max-width: 500px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <span class="status-dot"></span>
                <span class="header-title">LUMI</span>
            </div>
            <button class="reset-btn" id="reset-btn" onclick="resetWizard()">Start Over</button>
        </header>

        <main class="main-scroll">
            <!-- Progress bar -->
            <div class="progress-bar">
                <div class="progress-step" data-step="1"></div>
                <div class="progress-step" data-step="2"></div>
                <div class="progress-step" data-step="3"></div>
                <div class="progress-step" data-step="4"></div>
                <div class="progress-step" data-step="5"></div>
            </div>

            <!-- Selection summary (shows what you've picked) -->
            <div class="selection-summary" id="selection-summary"></div>

            <!-- STEP 1: WHO -->
            <div class="step active" data-step="1">
                <div class="step-label">Step 1 of 5</div>
                <div class="step-question">Who is this about?</div>
                <div class="options-list" id="who-options">
                    <div class="options-section-label">Kids</div>
                    <button class="option-btn pink" data-value="both_kids" data-label="The Kids" data-color="pink">
                        <div class="option-icon">👧👦</div>
                        <div class="option-text">
                            <div class="option-title">The Kids</div>
                            <div class="option-subtitle">Both Jackson & Henry</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn pink" data-value="jackson" data-label="Jackson" data-color="pink">
                        <div class="option-icon">👦</div>
                        <div class="option-text">
                            <div class="option-title">Jackson</div>
                            <div class="option-subtitle">6th grade</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn pink" data-value="henry" data-label="Henry" data-color="pink">
                        <div class="option-icon">👧</div>
                        <div class="option-text">
                            <div class="option-title">Henry</div>
                            <div class="option-subtitle">5th grade</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>

                    <div class="options-section-label">Me</div>
                    <button class="option-btn cyan" data-value="me" data-label="Me" data-color="cyan">
                        <div class="option-icon">🙋‍♀️</div>
                        <div class="option-text">
                            <div class="option-title">Me</div>
                            <div class="option-subtitle">Personal stuff</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>

                    <div class="options-section-label">Family</div>
                    <button class="option-btn purple" data-value="mom_dad" data-label="Mom & Dad" data-color="purple">
                        <div class="option-icon">👨‍👩</div>
                        <div class="option-text">
                            <div class="option-title">Mom & Dad</div>
                            <div class="option-subtitle">Parents next door</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn purple" data-value="my_mom" data-label="My Mom" data-color="purple">
                        <div class="option-icon">👩</div>
                        <div class="option-text">
                            <div class="option-title">My Mom</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn purple" data-value="my_dad" data-label="My Dad" data-color="purple">
                        <div class="option-icon">👨</div>
                        <div class="option-text">
                            <div class="option-title">My Dad</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn purple" data-value="brothers_family" data-label="Brother's Family" data-color="purple">
                        <div class="option-icon">👨‍👩‍👧‍👦</div>
                        <div class="option-text">
                            <div class="option-title">Brother's Family</div>
                            <div class="option-subtitle">Nieces, nephew, SIL</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>

                    <div class="options-section-label">Pets</div>
                    <button class="option-btn orange" data-value="dogs" data-label="Dogs" data-color="orange">
                        <div class="option-icon">🐕</div>
                        <div class="option-text">
                            <div class="option-title">Dogs</div>
                            <div class="option-subtitle">Both pups</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="cat" data-label="Cat" data-color="orange">
                        <div class="option-icon">🐈</div>
                        <div class="option-text">
                            <div class="option-title">Cat</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>

                    <div class="options-section-label">Other</div>
                    <button class="option-btn green" data-value="household" data-label="Household" data-color="green">
                        <div class="option-icon">🏠</div>
                        <div class="option-text">
                            <div class="option-title">Household</div>
                            <div class="option-subtitle">Home stuff</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn green" data-value="general" data-label="General" data-color="green">
                        <div class="option-icon">📋</div>
                        <div class="option-text">
                            <div class="option-title">General</div>
                            <div class="option-subtitle">Not person-specific</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                </div>
            </div>

            <!-- STEP 2: WHAT -->
            <div class="step" data-step="2">
                <div class="step-label">Step 2 of 5</div>
                <div class="step-question">What's happening?</div>
                <div class="options-list" id="what-options">
                    <!-- Populated dynamically based on WHO -->
                </div>
            </div>

            <!-- STEP 3: WHEN -->
            <div class="step" data-step="3">
                <div class="step-label">Step 3 of 5</div>
                <div class="step-question">When?</div>
                <div class="options-list" id="when-options">
                    <button class="option-btn orange" data-value="now" data-label="Now">
                        <div class="option-icon">⚡</div>
                        <div class="option-text">
                            <div class="option-title">Right Now</div>
                            <div class="option-subtitle">Happening currently</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="today" data-label="Today">
                        <div class="option-icon">📅</div>
                        <div class="option-text">
                            <div class="option-title">Today</div>
                            <div class="option-subtitle">Later today</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="tomorrow" data-label="Tomorrow">
                        <div class="option-icon">🌅</div>
                        <div class="option-text">
                            <div class="option-title">Tomorrow</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="this_week" data-label="This Week">
                        <div class="option-icon">📆</div>
                        <div class="option-text">
                            <div class="option-title">This Week</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="next_week" data-label="Next Week">
                        <div class="option-icon">➡️</div>
                        <div class="option-text">
                            <div class="option-title">Next Week</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="upcoming" data-label="Upcoming">
                        <div class="option-icon">🗓️</div>
                        <div class="option-text">
                            <div class="option-title">Upcoming</div>
                            <div class="option-subtitle">Future date</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="recurring" data-label="Recurring">
                        <div class="option-icon">🔄</div>
                        <div class="option-text">
                            <div class="option-title">Recurring</div>
                            <div class="option-subtitle">Repeating event</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="no_time" data-label="No specific time">
                        <div class="option-icon">∞</div>
                        <div class="option-text">
                            <div class="option-title">No Specific Time</div>
                            <div class="option-subtitle">Just a note/reminder</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                </div>
            </div>

            <!-- STEP 4: WHERE -->
            <div class="step" data-step="4">
                <div class="step-label">Step 4 of 5</div>
                <div class="step-question">Where?</div>
                <div class="options-list" id="where-options">
                    <button class="option-btn cyan" data-value="home" data-label="Home">
                        <div class="option-icon">🏠</div>
                        <div class="option-text">
                            <div class="option-title">Home</div>
                            <div class="option-subtitle">My house</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="moms_house" data-label="Mom's House">
                        <div class="option-icon">🏡</div>
                        <div class="option-text">
                            <div class="option-title">Mom's House</div>
                            <div class="option-subtitle">Co-parent's place</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="parents_house" data-label="Parents' House">
                        <div class="option-icon">🏘️</div>
                        <div class="option-text">
                            <div class="option-title">Parents' House</div>
                            <div class="option-subtitle">Mom & Dad next door</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="school" data-label="School">
                        <div class="option-icon">🏫</div>
                        <div class="option-text">
                            <div class="option-title">School</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="doctor" data-label="Doctor/Medical">
                        <div class="option-icon">🏥</div>
                        <div class="option-text">
                            <div class="option-title">Doctor / Medical</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="dentist" data-label="Dentist">
                        <div class="option-icon">🦷</div>
                        <div class="option-text">
                            <div class="option-title">Dentist</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="vet" data-label="Vet">
                        <div class="option-icon">🐾</div>
                        <div class="option-text">
                            <div class="option-title">Vet</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="store" data-label="Store">
                        <div class="option-icon">🛒</div>
                        <div class="option-text">
                            <div class="option-title">Store / Shopping</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="out" data-label="Out">
                        <div class="option-icon">🚗</div>
                        <div class="option-text">
                            <div class="option-title">Out / Errand</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="online" data-label="Online/Remote">
                        <div class="option-icon">💻</div>
                        <div class="option-text">
                            <div class="option-title">Online / Remote</div>
                            <div class="option-subtitle">Virtual, Zoom, etc.</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="other_location" data-label="Other">
                        <div class="option-icon">📍</div>
                        <div class="option-text">
                            <div class="option-title">Other Location</div>
                            <div class="option-subtitle">I'll specify</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn cyan" data-value="na" data-label="N/A">
                        <div class="option-icon">—</div>
                        <div class="option-text">
                            <div class="option-title">Not Applicable</div>
                            <div class="option-subtitle">Location doesn't matter</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                </div>
            </div>

            <!-- STEP 5: WHY / Details -->
            <div class="step" data-step="5">
                <div class="step-label">Step 5 of 5</div>
                <div class="step-question">Any details?</div>

                <div class="summary-card">
                    <div class="summary-row">
                        <span class="summary-label">Who</span>
                        <span class="summary-value" id="sum-who">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">What</span>
                        <span class="summary-value" id="sum-what">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">When</span>
                        <span class="summary-value" id="sum-when">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Where</span>
                        <span class="summary-value" id="sum-where">—</span>
                    </div>
                </div>

                <div class="text-input-area">
                    <textarea class="text-input" id="details-input" placeholder="Add any extra details, notes, or context..."></textarea>
                </div>

                <button class="action-btn" onclick="submitToLumi()">Send to LUMI</button>
                <div class="skip-link" onclick="submitToLumi()">or skip details and send</div>
            </div>

            <div class="bottom-spacer"></div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <span class="toast-text" id="toast-text">Sent to LUMI</span>
    </div>

    <script>
        const GITHUB_REPO = 'Natalie-Eiryk/Ragnarok';

        // State
        let currentStep = 1;
        let selections = {
            who: { value: '', label: '', color: '' },
            what: { value: '', label: '' },
            when: { value: '', label: '' },
            where: { value: '', label: '' },
            details: ''
        };

        // WHAT options based on WHO
        const whatOptions = {
            // Kids
            both_kids: [
                { section: 'Custody', items: [

        // Initialize

        bindOptionClicks();

        function bindOptionClicks() {
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => handleOptionClick(btn));
            });
        }

        function handleOptionClick(btn) {
            const value = btn.dataset.value;
            const label = btn.dataset.label || btn.querySelector('.option-title').textContent;
            const color = btn.dataset.color || 'orange';

            if (navigator.vibrate) navigator.vibrate(10);

            switch(currentStep) {
                case 1: // WHO
                    selections.who = { value, label, color };
                    populateWhatOptions(value);
                    goToStep(2);
                    break;
                case 2: // WHAT
                    selections.what = { value, label };
                    goToStep(3);
                    break;
                case 3: // WHEN
                    selections.when = { value, label };
                    goToStep(4);
                    break;
                case 4: // WHERE
                    selections.where = { value, label };
                    populateSummary();
                    goToStep(5);
                    break;
            }

            updateSelectionChips();
        }

        function populateWhatOptions(whoValue) {
            const container = document.getElementById('what-options');
            let options = whatOptions[whoValue];

            // Handle aliases
            if (typeof options === 'string') {
                options = whatOptions[options];
            }

            let html = '';
            options.forEach(section => {
                html += `<div class="options-section-label">${section.section}</div>`;
                section.items.forEach(item => {
                    html += `
                        <button class="option-btn orange" data-value="${item.value}" data-label="${item.label}">
                            <div class="option-icon">${item.icon}</div>
                            <div class="option-text">
                                <div class="option-title">${item.label}</div>
                            </div>
                            <span class="option-chevron">›</span>
                        </button>
                    `;
                });
            });

            container.innerHTML = html;
            bindOptionClicks();
        }

        function goToStep(step) {
            currentStep = step;
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.querySelector(`.step[data-step="${step}"]`).classList.add('active');
            updateProgress();

            // Show reset button after step 1
            document.getElementById('reset-btn').style.display = step > 1 ? 'block' : 'none';

            // Scroll to top
            document.querySelector('.main-scroll').scrollTop = 0;
        }

        function updateProgress() {
            document.querySelectorAll('.progress-step').forEach(step => {
                const stepNum = parseInt(step.dataset.step);
                step.classList.remove('active', 'done');
                if (stepNum < currentStep) step.classList.add('done');
                if (stepNum === currentStep) step.classList.add('active');
            });
        }

        function updateSelectionChips() {
            const container = document.getElementById('selection-summary');
            let html = '';

            if (selections.who.label) {
                const colorVar = `var(--lcars-${selections.who.color})`;
                html += `<div class="selection-chip"><span class="chip-dot" style="background:${colorVar}"></span>${selections.who.label}</div>`;
            }
            if (selections.what.label) {
                html += `<div class="selection-chip">${selections.what.label}</div>`;
            }
            if (selections.when.label) {
                html += `<div class="selection-chip">${selections.when.label}</div>`;
            }
            if (selections.where.label) {
                html += `<div class="selection-chip">${selections.where.label}</div>`;
            }

            container.innerHTML = html;
        }

        function populateSummary() {
            document.getElementById('sum-who').textContent = selections.who.label || '—';
            document.getElementById('sum-what').textContent = selections.what.label || '—';
            document.getElementById('sum-when').textContent = selections.when.label || '—';
            document.getElementById('sum-where').textContent = selections.where.label || '—';
        }

        function resetWizard() {
            selections = {
                who: { value: '', label: '', color: '' },
                what: { value: '', label: '' },
                when: { value: '', label: '' },
                where: { value: '', label: '' },
                details: ''
            };
            document.getElementById('details-input').value = '';
            goToStep(1);
            updateSelectionChips();
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function submitToLumi() {
            const details = document.getElementById('details-input').value.trim();
            selections.details = details;

            // Build title
            let title = `[QUICK] ${selections.who.label}: ${selections.what.label}`;
            if (selections.when.label !== 'No specific time') {
                title += ` (${selections.when.label})`;
            }

            // Build body
            let body = `## Quick Command\n\n`;
            body += `| Field | Value |\n|-------|-------|\n`;
            body += `| **Who** | ${selections.who.label} |\n`;
            body += `| **What** | ${selections.what.label} |\n`;
            body += `| **When** | ${selections.when.label} |\n`;
            body += `| **Where** | ${selections.where.label} |\n\n`;

            if (details) {
                body += `## Details\n${details}\n\n`;
            }

            body += `---\n*LUMI Mobile • ${new Date().toLocaleString()}*`;

            // Build labels
            const labels = ['lumi-command', 'quick'];
            if (['both_kids', 'jackson', 'henry'].includes(selections.who.value)) labels.push('kids');
            if (selections.who.value === 'me') labels.push('personal');
            if (['mom_dad', 'my_mom', 'my_dad', 'brothers_family'].includes(selections.who.value)) labels.push('family');
            if (['dogs', 'cat'].includes(selections.who.value)) labels.push('pets');

            const issueUrl = `https://github.com/${GITHUB_REPO}/issues/new?` +
                `labels=${labels.join(',')}&` +
                `title=${encodeURIComponent(title)}&` +
                `body=${encodeURIComponent(body)}`;

            window.open(issueUrl, '_blank');
            showToast('Opening GitHub...');
            if (navigator.vibrate) navigator.vibrate([10, 50, 10]);

            // Reset after a moment
            setTimeout(resetWizard, 500);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
