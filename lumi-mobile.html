<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>LUMI</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/lumi-192.png">
    <style>
        :root {
            --lcars-orange: #ff9900;
            --lcars-cyan: #00ccff;
            --lcars-purple: #cc99ff;
            --lcars-pink: #ff6b9d;
            --lcars-green: #30d158;
            --lcars-red: #ff453a;
            --lcars-yellow: #ffcc00;
            --lcars-blue: #5856d6;
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --bg-elevated: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --text-tertiary: rgba(255,255,255,0.3);
            --separator: rgba(255,255,255,0.08);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .app { height: 100%; display: flex; flex-direction: column; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; padding-top: calc(12px + var(--safe-top));
            background: var(--bg-primary); border-bottom: 1px solid var(--separator);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lcars-green); }
        .header-title { font-size: 20px; font-weight: 600; }
        .reset-btn {
            background: var(--bg-tertiary); border: none; border-radius: 8px;
            padding: 8px 14px; font-family: inherit; font-size: 14px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer; display: none;
        }
        .reset-btn:active { background: var(--bg-elevated); }

        /* Main */
        .main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }

        /* Progress */
        .progress-bar { display: flex; gap: 6px; margin-bottom: 24px; }
        .progress-step {
            flex: 1; height: 4px; background: var(--bg-tertiary); border-radius: 2px;
            transition: background 0.3s;
        }
        .progress-step.active { background: var(--lcars-orange); }
        .progress-step.done { background: var(--lcars-green); }

        /* Step */
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .step-label {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .step-question { font-size: 28px; font-weight: 700; margin-bottom: 20px; line-height: 1.2; }

        /* Selection summary */
        .selection-summary { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .selection-chip {
            background: var(--bg-tertiary); border-radius: 16px; padding: 6px 12px;
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
        }
        .selection-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Options list */
        .options-list { display: flex; flex-direction: column; gap: 8px; }
        .option-btn {
            display: flex; align-items: center; gap: 14px;
            width: 100%; padding: 16px; background: var(--bg-secondary);
            border: 2px solid transparent; border-radius: 12px;
            text-align: left; font-family: inherit; cursor: pointer;
            transition: all 0.15s;
        }
        .option-btn:active { background: var(--bg-tertiary); transform: scale(0.98); }
        .option-btn.selected { border-color: var(--lcars-orange); background: var(--bg-tertiary); }
        .option-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .option-text { flex: 1; }
        .option-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
        .option-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
        .option-chevron { color: var(--text-tertiary); font-size: 20px; }
        .option-map {
            color: var(--lcars-cyan); font-size: 18px; padding: 8px;
            margin-right: -8px; text-decoration: none;
        }

        /* Color variants */
        .option-btn.pink .option-icon { background: var(--lcars-pink); }
        .option-btn.cyan .option-icon { background: var(--lcars-cyan); }
        .option-btn.purple .option-icon { background: var(--lcars-purple); }
        .option-btn.orange .option-icon { background: var(--lcars-orange); }
        .option-btn.green .option-icon { background: var(--lcars-green); }
        .option-btn.red .option-icon { background: var(--lcars-red); }
        .option-btn.yellow .option-icon { background: var(--lcars-yellow); }
        .option-btn.blue .option-icon { background: var(--lcars-blue); }

        /* Section label */
        .options-section-label {
            font-size: 12px; font-weight: 600; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 16px 0 8px; margin-top: 8px;
            border-top: 1px solid var(--separator);
        }
        .options-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

        /* Text input */
        .text-input-area { margin-top: 16px; }
        .text-input {
            width: 100%; padding: 16px; background: var(--bg-secondary);
            border: 2px solid var(--bg-tertiary); border-radius: 12px;
            font-family: inherit; font-size: 17px; color: var(--text-primary);
            resize: none; min-height: 100px;
        }
        .text-input:focus { outline: none; border-color: var(--lcars-cyan); }
        .text-input::placeholder { color: var(--text-tertiary); }

        /* Summary */
        .summary-card {
            background: var(--bg-secondary); border-radius: 16px; padding: 20px;
            margin-bottom: 20px;
        }
        .summary-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 12px 0; border-bottom: 1px solid var(--separator);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { font-size: 14px; color: var(--text-secondary); }
        .summary-value { font-size: 16px; font-weight: 500; text-align: right; max-width: 60%; }

        /* Action button */
        .action-btn {
            width: 100%; padding: 18px; background: var(--lcars-orange);
            border: none; border-radius: 14px; font-family: inherit;
            font-size: 18px; font-weight: 600; color: #000; cursor: pointer;
            margin-top: 20px;
        }
        .action-btn:active { opacity: 0.9; transform: scale(0.98); }

        .skip-link {
            display: block; text-align: center; padding: 16px;
            color: var(--text-secondary); font-size: 15px; cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: calc(50px + var(--safe-bottom)); left: 50%;
            transform: translateX(-50%) translateY(100px); display: flex; align-items: center; gap: 10px;
            padding: 14px 20px; background: var(--bg-elevated); border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1); z-index: 200;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { width: 22px; height: 22px; color: var(--lcars-green); }
        .toast-text { font-size: 15px; font-weight: 500; }

        .bottom-spacer { height: calc(20px + var(--safe-bottom)); }

        @media (min-width: 500px) {
            .main-scroll { max-width: 500px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="app">

            <!-- STEP 4: WHEN -->

                        <span class="option-chevron">›</span>
                    </button>
                    <button class="option-btn orange" data-value="this_week" data-label="This Week">

                <div class="step-question">Where?</div>
                <div class="options-list" id="where-options"></div>
            </div>

            <!-- STEP 6: DETAILS -->

                <div class="step-label">Step 6 of 6</div>
                <div class="step-question">Any details?</div>

                <div class="summary-card">

                        <span class="summary-label">Who</span>
                        <span class="summary-value" id="sum-who">—</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">What</span>
                        <span class="summary-value" id="sum-what">—</span>
                    </div>
                    <div class="summary-row">

                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Where</span>
                        <span class="summary-value" id="sum-where">—</span>
                    </div>
                </div>

                <div class="text-input-area">
                    <textarea class="text-input" id="details-input" placeholder="Add any extra details, notes, or context..."></textarea>
                </div>

                <button class="action-btn" onclick="submitToLumi()">Send to LUMI</button>
                <div class="skip-link" onclick="submitToLumi()">or skip details and send</div>
            </div>

            <div class="bottom-spacer"></div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <span class="toast-text" id="toast-text">Sent to LUMI</span>
    </div>

        function bindOptionClicks() {
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Don't trigger if clicking the map link
                    if (e.target.classList.contains('option-map')) return;
                    handleOptionClick(btn);
                });
            });
        }

        function handleOptionClick(btn) {
            const value = btn.dataset.value;
            const label = btn.dataset.label || btn.querySelector('.option-title')?.textContent || value;
            const color = btn.dataset.color || 'orange';

            if (navigator.vibrate) navigator.vibrate(10);

            switch(currentStep) {
                case 1: // WHO
                    selections.who = { value, label, color };
                    populateCategories(value);
                    goToStep(2);
                    break;
                case 2: // CATEGORY
                    selections.category = { value, label };
                    populateActions(value);
                    goToStep(3);
                    break;
                case 3: // ACTION
                    selections.action = { value, label };
                    goToStep(4);
                    break;
                case 4: // WHEN
                    selections.when = { value, label };
                    populateWhereOptions();
                    goToStep(5);
                    break;
                case 5: // WHERE
                    selections.where = {
                        value,
                        label,
                        mapUrl: btn.dataset.mapSearch ? `https://maps.google.com/maps?q=${encodeURIComponent(btn.dataset.mapSearch)}` : ''
                    };
                    populateSummary();
                    goToStep(6);
                    break;
            }

            updateSelectionChips();
        }

        function getWhoGroup(whoValue) {
            if (['both_kids', 'jackson', 'henry'].includes(whoValue)) return 'kids';
            if (whoValue === 'me') return 'me';
            if (['mom_dad', 'brothers_family'].includes(whoValue)) return 'family';
            if (['dogs', 'cat'].includes(whoValue)) return 'pets';
            if (whoValue === 'household') return 'household';
            return 'general';
        }

        function populateCategories(whoValue) {
            const container = document.getElementById('category-options');
            const group = getWhoGroup(whoValue);
            const cats = categories[group];

            let html = '';
            cats.forEach(cat => {
                html += `
                    <button class="option-btn ${cat.color}" data-value="${cat.value}" data-label="${cat.label}">
                        <div class="option-icon">${cat.icon}</div>
                        <div class="option-text">
                            <div class="option-title">${cat.label}</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                `;
            });

            container.innerHTML = html;
            bindOptionClicks();
        }

        function populateActions(categoryValue) {
            const container = document.getElementById('action-options');
            const acts = actions[categoryValue] || [];

            // Update question
            document.getElementById('action-question').textContent =
                `What ${selections.category.label.toLowerCase()}?`;

            let html = '';
            acts.forEach(act => {
                html += `
                    <button class="option-btn orange" data-value="${act.value}" data-label="${act.label}">
                        <div class="option-icon">${act.icon}</div>
                        <div class="option-text">
                            <div class="option-title">${act.label}</div>
                        </div>
                        <span class="option-chevron">›</span>
                    </button>
                `;
            });

            container.innerHTML = html;
            bindOptionClicks();
        }

        function populateWhereOptions() {
            const container = document.getElementById('where-options');
            let html = '';

            Object.entries(whereOptions).forEach(([section, opts]) => {
                const sectionLabel = section.charAt(0).toUpperCase() + section.slice(1);
                html += `<div class="options-section-label">${sectionLabel}</div>`;

                opts.forEach(opt => {
                    const mapLink = opt.mapSearch
                        ? `<a class="option-map" href="https://maps.google.com/maps?q=${encodeURIComponent(opt.mapSearch)}" target="_blank" onclick="event.stopPropagation()">📍</a>`
                        : '';

                    html += `
                        <button class="option-btn cyan" data-value="${opt.value}" data-label="${opt.label}" ${opt.mapSearch ? `data-map-search="${opt.mapSearch}"` : ''}>
                            <div class="option-icon">${opt.icon}</div>
                            <div class="option-text">
                                <div class="option-title">${opt.label}</div>
                                ${opt.subtitle ? `<div class="option-subtitle">${opt.subtitle}</div>` : ''}
                            </div>
                            ${mapLink}
                            <span class="option-chevron">›</span>
                        </button>
                    `;
                });
            });

            container.innerHTML = html;
            bindOptionClicks();
        }

        function goToStep(step) {
            currentStep = step;
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.querySelector(`.step[data-step="${step}"]`).classList.add('active');
            updateProgress();
            document.getElementById('reset-btn').style.display = step > 1 ? 'block' : 'none';
            document.querySelector('.main-scroll').scrollTop = 0;
        }

        function updateProgress() {
            document.querySelectorAll('.progress-step').forEach(step => {
                const stepNum = parseInt(step.dataset.step);
                step.classList.remove('active', 'done');
                if (stepNum < currentStep) step.classList.add('done');
                if (stepNum === currentStep) step.classList.add('active');
            });
        }

        function updateSelectionChips() {
            const container = document.getElementById('selection-summary');
            let html = '';

            if (selections.who.label) {
                const colorVar = `var(--lcars-${selections.who.color})`;
                html += `<div class="selection-chip"><span class="chip-dot" style="background:${colorVar}"></span>${selections.who.label}</div>`;
            }
            if (selections.category.label) {
                html += `<div class="selection-chip">${selections.category.label}</div>`;
            }
            if (selections.action.label) {
                html += `<div class="selection-chip">${selections.action.label}</div>`;
            }
            if (selections.when.label) {
                html += `<div class="selection-chip">${selections.when.label}</div>`;
            }
            if (selections.where.label) {
                html += `<div class="selection-chip">${selections.where.label}</div>`;
            }

            container.innerHTML = html;
        }

        function populateSummary() {
            document.getElementById('sum-who').textContent = selections.who.label || '—';
            document.getElementById('sum-what').textContent =

            document.getElementById('sum-where').textContent = selections.where.label || '—';
        }

            selections = {

            const details = document.getElementById('details-input').value.trim();
            selections.details = details;

            let title = `[QUICK] ${selections.who.label}: ${selections.action.label}`;

            body += `| **Category** | ${selections.category.label} |\n`;

            body += `| **When** | ${selections.when.label} |\n`;
            body += `| **Where** | ${selections.where.label} |\n\n`;

            if (selections.where.mapUrl) {
                body += `📍 [Open in Maps](${selections.where.mapUrl})\n\n`;
            }

            if (details) {
                body += `## Details\n${details}\n\n`;
            }

            body += `---\n*LUMI Mobile • ${new Date().toLocaleString()}*`;

            const labels = ['lumi-command', 'quick', selections.category.value];
            const group = getWhoGroup(selections.who.value);
            if (group !== 'general') labels.push(group);

            const issueUrl = `https://github.com/${GITHUB_REPO}/issues/new?` +
                `labels=${labels.join(',')}&` +
                `title=${encodeURIComponent(title)}&` +
                `body=${encodeURIComponent(body)}`;

            window.open(issueUrl, '_blank');
            showToast('Opening GitHub...');
            if (navigator.vibrate) navigator.vibrate([10, 50, 10]);

            setTimeout(resetWizard, 500);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
