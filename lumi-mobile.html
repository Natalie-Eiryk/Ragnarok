<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --lcars-orange: #ff9900;
            --lcars-cyan: #00ccff;
            --lcars-purple: #cc99ff;
            --lcars-pink: #ff6b9d;
            --lcars-green: #30d158;
            --lcars-red: #ff453a;
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --bg-elevated: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --text-tertiary: rgba(255,255,255,0.3);
            --separator: rgba(255,255,255,0.08);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .app { height: 100%; display: flex; flex-direction: column; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; padding-top: calc(12px + var(--safe-top));
            background: var(--bg-primary); border-bottom: 1px solid var(--separator);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lcars-green); }
        .header-title { font-size: 20px; font-weight: 600; }
        .pending-badge {
            background: var(--lcars-purple); color: #000; font-size: 12px; font-weight: 600;
            padding: 4px 8px; border-radius: 10px; display: none;
        }

        /* Main scroll */
        .main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px; }

        /* Section */
        .section { margin-bottom: 16px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; background: var(--bg-secondary); border-radius: 10px;
            cursor: pointer; margin-bottom: 8px;
        }
        .section-header:active { background: var(--bg-tertiary); }
        .section-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title .dot { width: 10px; height: 10px; border-radius: 50%; }
        .section-chevron { color: var(--text-tertiary); font-size: 18px; transition: transform 0.2s; }
        .section.open .section-chevron { transform: rotate(90deg); }
        .section-content { display: none; }
        .section.open .section-content { display: block; }

        /* Subsection */
        .subsection-label {
            font-size: 11px; font-weight: 600; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px 6px;
        }

        /* Items grid */
        .items-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 4px 12px; }
        .item-btn {
            background: var(--bg-secondary); border: none; border-radius: 8px;
            padding: 10px 14px; font-family: inherit; font-size: 14px; font-weight: 500;
            color: var(--text-primary); cursor: pointer; transition: all 0.15s;
        }
        .item-btn:active { background: var(--bg-elevated); transform: scale(0.97); }

        /* Color coding */
        .kids .dot, .kids .item-btn { border-left: 3px solid var(--lcars-pink); }
        .me .dot, .me .item-btn { border-left: 3px solid var(--lcars-cyan); }
        .family .dot, .family .item-btn { border-left: 3px solid var(--lcars-purple); }
        .calendar .dot, .calendar .item-btn { border-left: 3px solid var(--lcars-orange); }
        .capture .dot, .capture .item-btn { border-left: 3px solid var(--lcars-green); }
        .kids .dot { background: var(--lcars-pink); }
        .me .dot { background: var(--lcars-cyan); }
        .family .dot { background: var(--lcars-purple); }
        .calendar .dot { background: var(--lcars-orange); }
        .capture .dot { background: var(--lcars-green); }

        /* Bottom spacer */
        .bottom-spacer { height: calc(20px + var(--safe-bottom)); }

        /* Sheet Modal */
        .sheet { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .sheet.open { pointer-events: auto; }
        .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; }
        .sheet.open .sheet-backdrop { opacity: 1; }
        .sheet-content {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--bg-secondary); border-radius: 14px 14px 0 0;
            padding: 12px 20px; padding-bottom: calc(24px + var(--safe-bottom));
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 85vh; overflow-y: auto;
        }
        .sheet.open .sheet-content { transform: translateY(0); }
        .sheet-handle { width: 36px; height: 5px; background: var(--bg-elevated); border-radius: 3px; margin: 0 auto 16px; }
        .sheet-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .sheet-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .sheet-icon svg { width: 22px; height: 22px; }
        .sheet-title { font-size: 20px; font-weight: 600; }

        /* Form elements */
        .picker-section { margin-bottom: 20px; }
        .picker-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .segmented-control { display: flex; background: var(--bg-tertiary); border-radius: 8px; padding: 2px; }
        .segment {
            flex: 1; padding: 10px 6px; background: transparent; border: none; border-radius: 6px;
            font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
        }
        .segment.active { background: var(--bg-elevated); color: var(--text-primary); }
        .time-detail { display: none; margin-top: 10px; }
        .time-input, .details-input {
            width: 100%; padding: 14px; background: var(--bg-tertiary); border: none; border-radius: 10px;
            font-family: inherit; font-size: 16px; color: var(--text-primary);
        }
        .details-input::placeholder { color: var(--text-tertiary); }
        .details-input:focus { outline: none; box-shadow: 0 0 0 2px var(--lcars-cyan); }
        .input-section { margin-bottom: 20px; }
        .action-button {
            width: 100%; padding: 16px; background: var(--lcars-orange); border: none; border-radius: 12px;
            font-family: inherit; font-size: 17px; font-weight: 600; color: #000; cursor: pointer;
        }
        .action-button:active { opacity: 0.9; transform: scale(0.98); }

        /* Who picker */
        .who-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .who-btn {
            padding: 8px 16px; background: var(--bg-tertiary); border: 2px solid transparent;
            border-radius: 20px; font-family: inherit; font-size: 14px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer;
        }
        .who-btn.active { border-color: var(--lcars-pink); color: var(--text-primary); background: var(--bg-elevated); }

        /* Toast */
        .toast {
            position: fixed; bottom: calc(50px + var(--safe-bottom)); left: 50%;
            transform: translateX(-50%) translateY(100px); display: flex; align-items: center; gap: 10px;
            padding: 14px 20px; background: var(--bg-elevated); border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1); z-index: 200;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { width: 22px; height: 22px; color: var(--lcars-green); }
        .toast-text { font-size: 15px; font-weight: 500; }

        @media (min-width: 500px) {
            .main-scroll { max-width: 500px; margin: 0 auto; }
            .sheet-content { max-width: 500px; left: 50%; transform: translateX(-50%) translateY(100%); }
            .sheet.open .sheet-content { transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>

                        <button class="item-btn" data-action="capture:todo">To-Do</button>
                        <button class="item-btn" data-action="capture:add_task">Add Task</button>
                        <button class="item-btn" data-action="capture:call_someone">Call Someone</button>
                        <button class="item-btn" data-action="capture:text_someone">Text Someone</button>
                        <button class="item-btn" data-action="capture:email">Email</button>
                        <button class="item-btn" data-action="capture:buy">Buy Something</button>
                        <button class="item-btn" data-action="capture:follow_up">Follow Up</button>
                        <button class="item-btn" data-action="capture:figure_out">Figure Out</button>
                        <button class="item-btn" data-action="capture:backlog">Backlog</button>
                    </div>
                </div>
            </div>

            <div class="bottom-spacer"></div>
        </main>
    </div>

    <!-- Sheet Modal -->
    <div id="sheet" class="sheet">
        <div class="sheet-backdrop" onclick="closeSheet()"></div>
        <div class="sheet-content">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <div class="sheet-icon" id="sheet-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </div>
                <div class="sheet-title" id="sheet-title">Quick Action</div>
            </div>

            <!-- Who picker (for kids actions) -->
            <div class="picker-section" id="who-section" style="display:none;">
                <div class="picker-label">Who</div>
                <div class="who-picker">
                    <button class="who-btn active" data-who="both">Both</button>
                    <button class="who-btn" data-who="jackson">Jackson</button>
                    <button class="who-btn" data-who="henry">Henry</button>
                </div>
            </div>

            <!-- When Picker -->
            <div class="picker-section" id="when-section">
                <div class="picker-label">When</div>
                <div class="segmented-control" id="when-picker">
                    <button class="segment active" data-when="now">Now</button>
                    <button class="segment" data-when="soon">Soon</button>
                    <button class="segment" data-when="later">Later</button>
                    <button class="segment" data-when="tomorrow">Tomorrow</button>
                </div>
                <div class="time-detail" id="time-detail">
                    <input type="time" id="time-input" class="time-input">
                </div>
            </div>

            <!-- Duration Picker -->
            <div class="picker-section" id="duration-section" style="display:none;">
                <div class="picker-label">Duration</div>
                <div class="segmented-control" id="duration-picker">
                    <button class="segment" data-duration="15">15m</button>
                    <button class="segment" data-duration="30">30m</button>
                    <button class="segment active" data-duration="60">1h</button>
                    <button class="segment" data-duration="120">2h</button>
                </div>
            </div>

            <!-- Details Input -->
            <div class="input-section">
                <input type="text" id="details-input" class="details-input" placeholder="Add details...">
            </div>

            <!-- Action Button -->
            <button class="action-button" onclick="submitAction()">Send to LUMI</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <span class="toast-text" id="toast-text">Sent to LUMI</span>
    </div>

    <script>
        const GITHUB_REPO = 'Natalie-Eiryk/Ragnarok';
        let currentAction = null;
        let selectedWho = 'both';
        let selectedWhen = 'now';
        let selectedDuration = 60;

        function toggleSection(header) {
            header.parentElement.classList.toggle('open');
            if (navigator.vibrate) navigator.vibrate(5);
        }

        // Item button handlers
        document.querySelectorAll('.item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentAction = btn.dataset.action;
                const label = btn.textContent;
                const [category] = currentAction.split(':');

                document.getElementById('sheet-title').textContent = label;

                // Color the icon
                const iconEl = document.getElementById('sheet-icon');
                iconEl.style.background = getComputedStyle(document.documentElement)
                    .getPropertyValue(`--lcars-${category === 'kids' ? 'pink' : category === 'me' ? 'cyan' : category === 'family' ? 'purple' : category === 'calendar' ? 'orange' : 'green'}`);
                iconEl.style.color = '#000';

                // Show/hide sections
                document.getElementById('who-section').style.display = category === 'kids' ? 'block' : 'none';
                document.getElementById('duration-section').style.display = category === 'calendar' ? 'block' : 'none';

                // Set placeholder
                document.getElementById('details-input').placeholder = getPlaceholder(currentAction);

                openSheet();
                if (navigator.vibrate) navigator.vibrate(10);
            });
        });

        // Who picker
        document.querySelectorAll('.who-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedWho = btn.dataset.who;
                if (navigator.vibrate) navigator.vibrate(5);
            });
        });

        // Segmented controls
        document.querySelectorAll('.segment[data-when]').forEach(seg => {
            seg.addEventListener('click', () => {
                document.querySelectorAll('.segment[data-when]').forEach(s => s.classList.remove('active'));
                seg.classList.add('active');
                selectedWhen = seg.dataset.when;
                document.getElementById('time-detail').style.display =
                    (selectedWhen === 'later' || selectedWhen === 'soon') ? 'block' : 'none';
                if (navigator.vibrate) navigator.vibrate(5);
            });
        });

        document.querySelectorAll('.segment[data-duration]').forEach(seg => {
            seg.addEventListener('click', () => {
                document.querySelectorAll('.segment[data-duration]').forEach(s => s.classList.remove('active'));
                seg.classList.add('active');
                selectedDuration = parseInt(seg.dataset.duration);
                if (navigator.vibrate) navigator.vibrate(5);
            });
        });

        function getPlaceholder(action) {
            if (action.includes('note') || action.includes('thought') || action.includes('idea')) return 'What\'s on your mind?';
            if (action.includes('call')) return 'Who to call?';
            if (action.includes('text') || action.includes('email')) return 'Who and what?';
            if (action.includes('buy')) return 'What to buy?';
            if (action.includes('pickup') || action.includes('dropoff')) return 'Location?';
            if (action.includes('transfer') || action.includes('exchange')) return 'Notes for handoff...';
            return 'Details...';
        }

        function openSheet() {
            document.getElementById('sheet').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            document.body.style.overflow = '';
            document.getElementById('details-input').value = '';
            currentAction = null;
        }

        function computeDateTime() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const timeInput = document.getElementById('time-input').value;

            switch(selectedWhen) {
                case 'now': return { date: today, time: now.toTimeString().slice(0,5) };
                case 'soon':
                    if (timeInput) return { date: today, time: timeInput };
                    now.setMinutes(now.getMinutes() + 30);
                    return { date: today, time: now.toTimeString().slice(0,5) };
                case 'later':
                    if (timeInput) return { date: today, time: timeInput };
                    now.setHours(now.getHours() + 2);
                    return { date: today, time: now.toTimeString().slice(0,5) };
                case 'tomorrow':
                    now.setDate(now.getDate() + 1);
                    return { date: now.toISOString().split('T')[0], time: '09:00' };
                default: return { date: today, time: now.toTimeString().slice(0,5) };
            }
        }

        function submitAction() {
            if (!currentAction) return;

            const details = document.getElementById('details-input').value.trim();
            const { date, time } = computeDateTime();
            const [category, type] = currentAction.split(':');
            const label = document.getElementById('sheet-title').textContent;

            let title = `[QUICK:${currentAction}] ${label}`;
            if (details) title += ` - ${details.substring(0, 50)}`;

            let body = `## Quick Action\n\`${currentAction}\`\n\n`;
            if (category === 'kids') body += `## Who\n${selectedWho}\n\n`;
            body += `## When\n${date} ${time}\n\n`;
            if (category === 'calendar') body += `## Duration\n${selectedDuration} minutes\n\n`;
            body += `## Details\n${details || '(none)'}\n\n`;
            body += `---\n*LUMI Mobile • ${new Date().toISOString()}*`;

            const issueUrl = `https://github.com/${GITHUB_REPO}/issues/new?` +
                `labels=lumi-command,quick,${category}&` +
                `title=${encodeURIComponent(title)}&` +
                `body=${encodeURIComponent(body)}`;

            window.open(issueUrl, '_blank');
            showToast('Sent to LUMI');
            if (navigator.vibrate) navigator.vibrate([10, 50, 10]);
            closeSheet();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Swipe to close
        let touchStartY = 0;
        const sheetContent = document.querySelector('.sheet-content');
        sheetContent.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
        sheetContent.addEventListener('touchmove', e => {
            if (e.touches[0].clientY - touchStartY > 100) closeSheet();
        });

        // Load pending count
        async function loadPending() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues?labels=lumi-command&state=open&per_page=100`);
                const issues = await res.json();
                const count = Array.isArray(issues) ? issues.length : 0;
                const el = document.getElementById('pending-badge');
                if (count > 0) { el.textContent = count; el.style.display = 'inline'; }
                else { el.style.display = 'none'; }
            } catch (e) { document.getElementById('pending-badge').style.display = 'none'; }
        }
        loadPending();
        setInterval(loadPending, 60000);
    </script>
</body>
</html>
